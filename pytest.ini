[pytest]
# Kořen projektu – pytest hledá testy od tohoto místa
testpaths = tests

# Pojmenování testovacích souborů a funkcí (výchozí hodnoty, explicitně pro přehlednost)
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Zobrazit výstup print() při selhání testu
# addopts = -v --tb=short